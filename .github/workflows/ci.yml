name: CI

on:
  push:
  pull_request:

jobs:
  swift-tests:
    name: Swift tests (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

  python-sanity:
    name: Python sanity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate server script
        run: python -m py_compile AuraluxEngine/server.py
