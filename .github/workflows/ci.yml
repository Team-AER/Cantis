name: CI

on:
  push:
  pull_request:

jobs:
  swift-tests:
    name: Swift tests (macOS)
    # Pin to macOS 15 — app requires macOS 15+ and macos-latest may lag behind.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test
